<div class="modal-overlay" onclick="if(event.target===this) this.closest('#product-modal').innerHTML=''">
  <style>
    .modal-card {
      background: var(--blz-cream);
      border: 5px solid var(--blz-dark);
      border-radius: 24px;
      padding: 2rem;
      max-width: 540px;
      width: 100%;
      box-shadow: 12px 12px 0 var(--blz-green-dark);
      position: relative;
      animation: modal-pop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes modal-pop {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .modal-close {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      background: var(--blz-red);
      color: var(--blz-cream);
      border: 3px solid var(--blz-dark);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: bold;
    }
    .modal-img {
      width: 100%;
      height: 200px;
      background: var(--blz-green);
      border: 3px solid var(--blz-dark);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 6rem;
      margin-bottom: 1.25rem;
      overflow: hidden;
    }
    .modal-img img { width: 100%; height: 100%; object-fit: cover; }
    .modal-name {
      font-family: 'Bagel Fat One', sans-serif;
      font-size: 2rem;
      color: var(--blz-dark);
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }
    .modal-tagline {
      font-style: italic;
      color: var(--blz-green-dark);
      margin-bottom: 1rem;
    }
    .modal-desc { color: var(--blz-dark); margin-bottom: 1.5rem; }
    .modal-price {
      font-family: 'Bungee', sans-serif;
      font-size: 1.8rem;
      color: var(--blz-red);
      margin-bottom: 1rem;
    }

    /* BUY BUTTON + SMOKE PUFF */
    .buy-btn {
      position: relative;
      font-family: 'Bungee', sans-serif;
      background: var(--blz-green);
      color: var(--blz-dark);
      border: 4px solid var(--blz-dark);
      padding: 1rem 2rem;
      font-size: 1.1rem;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 12px;
      box-shadow: 4px 4px 0 var(--blz-dark);
      width: 100%;
      overflow: visible;
    }
    .puff-cloud {
      position: absolute;
      bottom: 90%;
      left: 50%;
      width: 110px;
      height: 110px;
      background: radial-gradient(circle, rgba(45, 45, 45, 0.75), transparent 60%);
      border-radius: 50%;
      filter: blur(15px);
      pointer-events: none;
      opacity: 0;
      transform: translateX(-50%);
    }
    .buy-btn.puffing .puff-cloud {
      animation: big-puff 1.1s ease-out forwards;
    }
    @keyframes big-puff {
      0%   { transform: translateX(-50%) translateY(0) scale(0.3); opacity: 0; }
      25%  { opacity: 0.9; }
      100% { transform: translateX(-50%) translateY(-90px) scale(3); opacity: 0; }
    }
  </style>

  <div class="modal-card">
    <button class="modal-close" onclick="this.closest('#product-modal').innerHTML=''">✕</button>

    <div class="modal-img">
      {% if product.image %}
        <img src="{{ product.image.url }}" alt="{{ product.name }}">
      {% else %}
        {{ product.emoji }}
      {% endif %}
    </div>

    <h2 class="modal-name">{{ product.name }}</h2>
    <p class="modal-tagline">"{{ product.tagline }}"</p>
    <p class="modal-desc">{{ product.description }}</p>
    <p class="modal-price">R{{ product.price }}</p>

    <button class="buy-btn"
            hx-post="{% url 'buy:place_order' product.pk %}"
            hx-target="#product-modal"
            hx-swap="innerHTML"
            onclick="this.classList.add('puffing'); setTimeout(() => this.classList.remove('puffing'), 1100)">
      BUY NOW 💨
      <span class="puff-cloud"></span>
    </button>
  </div>
</div>
