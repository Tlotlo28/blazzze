<div class="modal-overlay" onclick="if(event.target===this) this.closest('#product-modal').innerHTML=''">
  <style>
    .ordered-card {
      background: var(--blz-green);
      border: 5px solid var(--blz-dark);
      border-radius: 24px;
      padding: 3rem 2rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 12px 12px 0 var(--blz-green-dark);
      animation: modal-pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .ordered-title {
      font-family: 'Bagel Fat One', sans-serif;
      font-size: clamp(2.5rem, 8vw, 4rem);
      color: var(--blz-cream);
      text-shadow: 4px 4px 0 var(--blz-dark);
      line-height: 0.95;
      margin-bottom: 1rem;
    }
    .ordered-sub {
      color: var(--blz-dark);
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }
    .ordered-btn {
      font-family: 'Bungee', sans-serif;
      background: var(--blz-dark);
      color: var(--blz-cream);
      border: 4px solid var(--blz-dark);
      padding: 1rem 2rem;
      font-size: 1rem;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 12px;
      box-shadow: 4px 4px 0 var(--blz-cream);
    }
  </style>

  <div class="ordered-card">
    <h2 class="ordered-title">ORDER PLACED 🚀</h2>
    <p class="ordered-sub">
      Your <strong>{{ product.name }}</strong> is being assembled by union-protected stoners.<br>
      <span style="opacity: 0.85;">ETA: vibes. Your cousin is on the way. Probably.</span>
    </p>
    <button class="ordered-btn" onclick="this.closest('#product-modal').innerHTML=''">
      BLAZE IT 🍃
    </button>
  </div>
</div>
