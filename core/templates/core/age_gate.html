{% extends "base.html" %}
{% load blazzze_tags %}

{% block title %}Hold up — Blazzze{% endblock %}

{% block content %}
<section style="min-height: 60vh; display:flex; align-items:center; justify-content:center; padding: 2rem 1rem;">
  <div style="
    background: var(--blz-cream);
    border: 5px solid var(--blz-dark);
    border-radius: 24px;
    padding: 3rem 2rem;
    max-width: 600px;
    width: 100%;
    text-align: center;
    box-shadow: 12px 12px 0 var(--blz-green-dark);
  ">
    <p style="
      font-family: 'Bungee', sans-serif;
      color: var(--blz-red);
      font-size: 1rem;
      letter-spacing: 4px;
      margin-bottom: 1rem;
    ">
      ⚠️ HOLD UP ⚠️
    </p>

    <h1 style="
      font-family: 'Bagel Fat One', sans-serif;
      font-size: clamp(2.5rem, 7vw, 5rem);
      line-height: 0.95;
      color: var(--blz-green-dark);
      text-shadow: 4px 4px 0 var(--blz-green);
      margin-bottom: 1.5rem;
    ">
      ARE YOU 18+?
    </h1>

    <p style="font-size: 1.15rem; margin-bottom: 2rem; color: var(--blz-dark);">
      
      <span style="color: var(--blz-gray); font-size: 0.95rem;">
        (We legally have to ask. Blazzze doesn't actually care.)
      </span>
    </p>

    <form method="post" style="display:flex; gap:1rem; justify-content:center; flex-wrap:wrap;">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next_url }}">

      <button type="submit" name="choice" value="yes" style="
        font-family: 'Bungee', sans-serif;
        background: var(--blz-green);
        color: var(--blz-dark);
        border: 4px solid var(--blz-dark);
        padding: 1rem 2rem;
        font-size: 1rem;
        letter-spacing: 1px;
        cursor: pointer;
        border-radius: 12px;
        box-shadow: 4px 4px 0 var(--blz-dark);
      ">
        YEAH I'M GROWN
      </button>

      <button type="submit" name="choice" value="no" style="
        font-family: 'Bungee', sans-serif;
        background: var(--blz-cream);
        color: var(--blz-dark);
        border: 4px solid var(--blz-dark);
        padding: 1rem 2rem;
        font-size: 1rem;
        letter-spacing: 1px;
        cursor: pointer;
        border-radius: 12px;
        box-shadow: 4px 4px 0 var(--blz-dark);
      ">
        NOPE I JUST GOT HERE
      </button>
    </form>

  
  </div>
</section>
{% endblock %}
